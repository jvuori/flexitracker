name: CI

# Unit tests + typecheck. Runs on PRs and is called by deploy-qa on master push
# (which is where the master build gets its CI), so no duplicate runs.
on:
  pull_request:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  daemon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon-py
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags/history for hatch-vcs version resolution
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      # Unit tests + the 24 behavioural vectors (daemon-py/tests/vectors).
      - run: uv run pytest -q
