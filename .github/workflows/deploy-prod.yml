name: Deploy PROD

# PROD deploys ONLY on explicit manual dispatch — never automatically.
# Gated twice: the latest QA deploy on main must have succeeded, and the
# "production" environment requires manual approval (configure a required
# reviewer on the environment in repo settings).
on:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Require a green QA run on main
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-qa.yml',
              branch: 'master',
              status: 'success',
              per_page: 1,
            });
            if (runs.data.total_count === 0) {
              core.setFailed('No successful QA deploy on main — QA e2e must pass before PROD.');
            }

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    environment: production   # add a required reviewer here for manual approval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Deploy to PROD
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --env prod
