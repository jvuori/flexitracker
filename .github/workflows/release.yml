name: Release

# Publishing a GitHub Release (which creates the vX.Y.Z tag) triggers this:
#   - build the Python wheel + sdist and publish to PyPI (keyless OIDC trusted
#     publishing) so users can `uv tool install flexitracker`;
#   - build a standalone single-file executable for Windows + Linux and attach it
#     to the Release under stable asset names for the download buttons.
#
# The version is derived from the tag by hatch-vcs (see daemon-py/pyproject.toml),
# so the tag IS the version — nothing to keep in sync. Use the `/release` command
# (or `gh release create vX.Y.Z`) to cut a release; do not push tags by hand.
#
# One-time bootstrap (like the Cloudflare IdP): configure this repo as a PyPI
# Trusted Publisher for the `flexitracker` project (no stored token needed).
on:
  release:
    types: [published]
  # Rebuild/attach executables for an existing tag (uses this branch's workflow),
  # e.g. after fixing the build. Does not re-publish the wheel to PyPI.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build executables for (e.g. v0.2.0)"
        required: true

permissions:
  contents: write # attach assets to the Release

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  # Build the wheel + sdist, attach to the Release, and publish to PyPI.
  # Only on a real Release publish — a manual exe rebuild must not re-publish.
  wheel:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs derives the version
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Pin the version to the tag
        # hatch-vcs would otherwise read the tree as a dev version once the bake
        # step below dirties it; pin it to the tag so the wheel is exactly vX.Y.Z.
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: Bake the PROD backend URL into the wheel
        # Rewrites BAKED_BACKEND_URL so a user supplies only a key. If PROD_BASE_URL
        # is unset the URL stays empty and users pass --backend-url (self-hosters).
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: |
          f=daemon-py/src/flexitracker/_backend.py
          sed -i "s|^BAKED_BACKEND_URL = \"\"|BAKED_BACKEND_URL = \"${PROD_BASE_URL}\"|" "$f"
          grep BAKED_BACKEND_URL "$f"
      - name: Build wheel + sdist
        working-directory: daemon-py
        run: uv build
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Explicit extensions so the .gitignore uv writes into dist/ is not
          # attached (GitHub would rename it to default.gitignore).
          files: |
            daemon-py/dist/*.whl
            daemon-py/dist/*.tar.gz
          fail_on_unmatched_files: false
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: daemon-py/dist/
          skip-existing: true

  # Build the standalone single-file executable per OS and attach it to the Release.
  exe:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: flexitracker-linux-x86_64
          - os: windows-latest
            asset: flexitracker-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so the frozen exe's bundled metadata carries the tag version
          ref: ${{ github.event.inputs.tag }} # empty on a release event = the tag commit
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Pin the version to the tag
        # So the frozen exe's bundled metadata is exactly vX.Y.Z regardless of the
        # bake step dirtying the tree (which hatch-vcs would read as a dev version).
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: Bake the PROD backend URL into the executable
        shell: bash
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: |
          f=daemon-py/src/flexitracker/_backend.py
          sed -i "s|^BAKED_BACKEND_URL = \"\"|BAKED_BACKEND_URL = \"${PROD_BASE_URL}\"|" "$f"
      - name: Freeze single-file executable
        working-directory: daemon-py
        shell: bash # git-bash on Windows; the default there is PowerShell, which can't parse the \-continuations
        # --copy-metadata bundles the dist-info so `--version` (importlib.metadata)
        # resolves the tag version inside the frozen exe. Exclude stdlib the daemon
        # never imports to keep the download lean.
        run: |
          uv sync --group build
          uv run pyinstaller --onefile --name flexitracker --paths src --console \
            --copy-metadata flexitracker \
            --exclude-module tkinter --exclude-module unittest --exclude-module test \
            --exclude-module pydoc --exclude-module lib2to3 --exclude-module sqlite3 \
            --exclude-module distutils --exclude-module xmlrpc --exclude-module pdb \
            pyinstaller_entry.py
      - name: Rename to the stable asset name
        shell: bash
        working-directory: daemon-py
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/flexitracker.exe "dist/${{ matrix.asset }}"
          else
            mv dist/flexitracker "dist/${{ matrix.asset }}"
          fi
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          files: daemon-py/dist/${{ matrix.asset }}
          fail_on_unmatched_files: false
