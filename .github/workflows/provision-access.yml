name: Provision Access

# Version-controlled Cloudflare Access setup — creates the bypass applications
# for the daemon/monitoring paths (/ingest, /config, /health) so non-browser
# clients aren't challenged. Idempotent; safe to re-run. Run manually per env.
on:
  workflow_dispatch:
    inputs:
      hostname:
        description: Worker hostname to configure (qa or prod)
        required: true
        default: flexi-worker-cloud-qa.jaakko-vuori.workers.dev

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create Access bypass apps
        working-directory: backend
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HOSTNAME: ${{ inputs.hostname }}
        run: node tools/setup-access-bypass.mjs
