name: Deploy QA → PROD

# Continuous Deployment. Every push to master: unit tests → deploy QA → e2e
# against live QA → (on green) promote the SAME commit to PROD automatically.
# A red e2e blocks the promotion, so the e2e suite is the ONLY safety net in
# front of production. `deploy-prod.yml` stays for manual re-deploys/rollbacks.
on:
  push:
    branches: [master]
    # Skip pushes that cannot change the deployed system. This is a DENYLIST on
    # purpose: an allowlist would silently stop deploying a newly added source
    # directory, and the e2e that gates PROD would never run for it. Deploy
    # unless proven inert. A commit touching both an ignored path and a real one
    # still deploys.
    # Assumes nothing in the build reads Markdown — if a generated docs site or
    # Markdown compiled into the UI is ever added, narrow these.
    paths-ignore:
      - "openspec/**"
      - "docs/**"
      - "**/*.md"

# Queue, never cancel: a rapid second push must not abort an in-flight PROD
# deploy mid-promotion.
concurrency:
  group: qa
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Deploy to QA
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --env qa

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Wipe QA and re-materialize the scenario fixtures, then validate every
      # day's computed numbers against the expected oracle. This resets any
      # manual exploration done on QA between deploys.
      # Self-provisioning: bootstrap wipes ALL QA data and mints its own keys —
      # no seed key needed. Repeatable clean slate every deploy.
      - name: Load & validate scenario fixtures on QA
        working-directory: backend
        env:
          BASE: ${{ vars.QA_BASE_URL }}
        run: node e2e/fixtures.mjs
      - name: End-to-end smoke (Access-authed API) against live QA
        working-directory: backend
        env:
          BASE: ${{ vars.QA_BASE_URL }}
          # Access service token for non-interactive auth on user routes.
          CF_ACCESS_CLIENT_ID: ${{ secrets.QA_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.QA_ACCESS_CLIENT_SECRET }}
        run: node e2e/smoke.mjs

  # Continuous Deployment: a green e2e promotes THIS commit to PROD. Code only —
  # no fixtures, no /test surface (QA_TEST_MODE is absent from env.prod), so the
  # PROD data firewall is unaffected.
  prod:
    needs: e2e
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Deploy to PROD
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --env prod
