name: Decommission retired hostname/Worker

# Delete the Access apps (and optionally the Worker) left orphaned by a rename.
# DESTRUCTIVE and manual-only. Dry-runs unless `confirm` exactly equals
# `hostname`, and refuses anything still declared in wrangler.toml (live).
on:
  workflow_dispatch:
    inputs:
      hostname:
        description: Retired hostname whose Access apps should be deleted
        required: true
      worker_name:
        description: Retired Worker script to delete (optional; deletes its DO data too)
        required: false
        default: ""
      confirm:
        description: Type the hostname again to execute. Leave empty for a DRY RUN.
        required: false
        default: ""

jobs:
  decommission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Decommission
        working-directory: backend
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HOSTNAME: ${{ inputs.hostname }}
          WORKER_NAME: ${{ inputs.worker_name }}
          CONFIRM: ${{ inputs.confirm }}
        run: node tools/decommission.mjs
