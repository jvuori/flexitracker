# Two isolated environments (deployment-pipeline spec). Named environments do
# NOT inherit top-level bindings, so DO/D1 bindings + migrations are repeated per
# env. The top-level config is used by `wrangler dev` (local simulation).
#
# Before first deploy, create the D1 databases and paste their ids below:
#   wrangler d1 create flexi-registry-qa
#   wrangler d1 create flexi-registry-prod

name = "flexitracker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]


[vars]
DEV_MODE = "1"
DEV_IDENTITY = "dev@local"
ADMIN_EMAILS = "dev@local,jaakko.vuori@gmail.com"
QA_TEST_MODE = "1"
QA_FIXTURE_EMAIL = "dev@local"

[[durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[d1_databases]]
binding = "REGISTRY"
database_name = "flexi-registry-dev"
database_id = "local-dev"          # replaced by real ids in qa/prod

# ---- QA: auto-deployed on every push to main ----
[env.qa]
name = "flexitracker-qa"

[env.qa.vars]
DEV_MODE = "0"
ADMIN_EMAILS = "jaakko.vuori@gmail.com"
ACCESS_TEAM_DOMAIN = "flexitracker.cloudflareaccess.com"
ACCESS_AUD = "e25fbe48e0f2476482a7363778eaefd15e76b6d38d6765e9ecf85af2feb612db"
# QA-only test surface. Deliberately absent from [env.prod.vars] (PROD firewall).
QA_TEST_MODE = "1"
QA_FIXTURE_EMAIL = "jaakko.vuori@gmail.com"
# Best-effort admin notification on new access requests (Option B — native, free,
# no ESP, no email to end users). Enable by ONE-TIME bootstrap: set up Cloudflare
# Email Routing on a domain, verify the destination address, then uncomment the
# [[env.qa.send_email]] binding below and set ADMIN_NOTIFY_ADDRESS. Until then,
# notifications live only in the in-app registrations queue.
# ADMIN_NOTIFY_ADDRESS = "jaakko.vuori@gmail.com"

[[env.qa.durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[env.qa.migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[env.qa.d1_databases]]
binding = "REGISTRY"
database_name = "flexi-registry-qa"
database_id = "980270e5-a098-4f27-9451-9b4b8635c35f"

# ---- PROD: deployed only on explicit manual trigger ----
[env.prod]
name = "flexitracker-prod"
# PROD is reachable ONLY via the custom domain below — the *.workers.dev URL is
# disabled so there is a single, Access-protected entrypoint.
workers_dev = false

# Custom domain: Cloudflare attaches flexitracker.vuorinet.net to this Worker on
# deploy and auto-provisions + auto-renews the edge TLS cert (no certbot, no key,
# no origin cert). Requires the API token to have, for the vuorinet.net zone,
# Workers Routes:Edit + DNS:Edit + SSL and Certificates:Edit + Zone:Read.
[[env.prod.routes]]
pattern = "flexitracker.vuorinet.net"
custom_domain = true

[env.prod.vars]
DEV_MODE = "0"
ADMIN_EMAILS = "jaakko.vuori@gmail.com"
ACCESS_TEAM_DOMAIN = "flexitracker.cloudflareaccess.com"
# PROD gets its OWN Access application → its OWN AUD, created by
# provision-access.yml for the custom domain flexitracker.vuorinet.net.
ACCESS_AUD = "REPLACE_WITH_PROD_AUD"
# Admin notification on new access requests — enable after the one-time Email
# Routing bootstrap (see the QA note above), then uncomment [[env.prod.send_email]].
# ADMIN_NOTIFY_ADDRESS = "jaakko.vuori@gmail.com"

[[env.prod.durable_objects.bindings]]
name = "TENANT"
class_name = "TenantDO"

[[env.prod.migrations]]
tag = "v1"
new_sqlite_classes = ["TenantDO"]

[[env.prod.d1_databases]]
binding = "REGISTRY"
database_name = "flexi-registry-prod"
database_id = "194c3af0-4eb1-4e07-a1f9-0e03cdfc49c5"
